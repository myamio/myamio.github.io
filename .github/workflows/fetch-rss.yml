name: Fetch RSS and Update Gist

on:
  schedule:
    - cron: '0 16 * * *' # Every day at 01:00 JST (16:00 UTC)
  workflow_dispatch:

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS Data
        run: node scripts/fetch-rss.js

      - name: Update Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        if: env.GH_TOKEN != '' && env.GIST_ID != ''
        run: |
          if [ -f "rss-feed.json" ]; then
            gh gist edit $GIST_ID -a rss-feed.json
          else
            echo "rss-feed.json not found!"
            false
          fi
