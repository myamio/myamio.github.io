    ogDescription: "Amazonでみやみおの英語が話せない人ほど、うまくいく: 〜インバウンド対応で伝わる英語に変わる考え方〜。アマゾンならポイント還元本が多数。一度購入いただいた電子書籍は、KindleおよびFire端末、スマートフォンやタブレットなど、様々な端末でもお楽しみいただけます。"
  - title: "AIによる認知負荷（PDF版）"
    url: "https://note.com/myamio/n/n1946d5983cf8"
    description: "note"
    icon: "book"
    image: "/images/outputs/note1.jpeg"
    ogTitle: "【PDF配布】AIの「便利さ」の裏にある、目に見えない疲れの正体とは？｜myamio | 最適を形に"
    ogDescription: "文章の要約やリサーチなど、膨大な情報を素早く処理するためにAIを活用する機会が増えました。作業スピードは間違いなく向上しているはずなのに、なぜか一日の終わりに感じる「頭の疲れ」が以前より重くなっていると感じたことはありませんか。  たとえば、長文の資料をAIに読み込ませて要約してもらったとします。一瞬で整った文章が出力されますが、AIは時折「もっともらしいウソ」を混ぜてくることがあります。そのため、出力された結果が本当に正しいのか、裏付けを取る事実確認の作業が欠かせません。  結果として、元の資料を最初から自分のペースで読み込む以上に神経を使い、特有の疲労感を抱えてしまうことがあります"
  - title: "AIによる認知負荷"
    url: "https://zenn.dev/myamio/books/ai-induced-cognitive-load"
    description: "Zenn Book"
    icon: "book"
    image: "/images/outputs/zenn1.jpg"
    ogTitle: "AIによる認知負荷"
    ogDescription: "色々な観点から人がAIから受ける認知負荷について書きました。"
  - title: "AIに書き換えられる前提で、今エンジニアが問うべき唯一の質問 〜1年後のための実装は、もはや技術的負債である〜"
    url: "https://zenn.dev/myamio/books/ai-era-software-design"
    description: "Zenn Book"
    icon: "book"
    image: "/images/outputs/zenn2.jpg"
    ogTitle: "AIに書き換えられる前提で、今エンジニアが問うべき唯一の質問 〜1年後のための実装は、もはや技術的負債である〜"
    ogDescription: "生成AIやAIエージェントの急速な進化を背景に、従来の「堅牢で長く使い続けられる設計」がもはや「技術的負債」となり得ることを指摘し、AIによるコードの書き換えや代替を前提とした新しい適応戦略を提案しています。将来のための作り込みを手放し、「今」ユーザーに価値を届けることに焦点を当"

