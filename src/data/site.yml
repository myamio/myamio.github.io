profile:
  name: "みやみお"
  title: "みやみおは何をする人なのか？"
  intro: "フルスタックエンジニアとして活動しています。現在、「情報を溜め込まず、その場で生成する」という開発スタイルを実験中です。システムも人も、多くのものを抱え込みすぎない「ステートレス・エンジニアリング」が、変化の多い今の時代に合っていると感じています。この身軽なアプローチに触れることが、皆様ご自身の抱える複雑な課題を解きほぐし、新たな視点を見つけるきっかけになればと考えています。"
  avatar: "/avatar.jpg"

